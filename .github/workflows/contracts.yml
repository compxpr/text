name: contracts

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-contracts:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install contract dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r contract-requirements.txt

      - name: Run Python contract checker
        run: python contracts/tools/check.py

      - name: Run PowerShell contract wrapper
        shell: pwsh
        run: pwsh -NoProfile -File contracts/tools/Validate-Contracts.ps1
